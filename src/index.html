<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Scrimora Link</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Inter Variable", ui-sans-serif, system-ui, sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgba(68, 117, 255, 0.14), transparent 32rem),
          linear-gradient(180deg, #fbfcff 0%, #eef3fb 100%);
      }

      main {
        width: min(38rem, calc(100vw - 2rem));
        padding: 2rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(23, 32, 51, 0.08);
        box-shadow: 0 24px 60px rgba(19, 36, 76, 0.12);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.9rem;
      }

      p {
        margin: 0.5rem 0;
        line-height: 1.5;
        color: #51607a;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9rem;
        padding: 0.15rem 0.35rem;
        border-radius: 0.35rem;
        background: rgba(68, 117, 255, 0.08);
        color: #2545a1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Scrimora Link</h1>
      <p>
        Scrimora Link runs in the background, listens on localhost, and lets
        Scrimora import recent League custom games from the local client.
      </p>
      <p>
        Open the custom-game import tab in Scrimora and launch the app via
        <code>scrimora-link://import</code>.
      </p>
    </main>
  </body>
  </html>
