name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Rust fmt
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test --locked
        working-directory: src-tauri

  build-artifacts:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ''
            artifact_name: scrimora-link-windows
            bundle_path: src-tauri/target/release/bundle/**
          - os: macos-latest
            args: --target aarch64-apple-darwin
            artifact_name: scrimora-link-macos-aarch64
            bundle_path: src-tauri/target/aarch64-apple-darwin/release/bundle/**
          - os: macos-latest
            args: --target x86_64-apple-darwin
            artifact_name: scrimora-link-macos-x64
            bundle_path: src-tauri/target/x86_64-apple-darwin/release/bundle/**

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop bundle
        shell: bash
        run: |
          if [ -n "${{ matrix.args }}" ]; then
            bun run tauri build -- --config src-tauri/tauri.ci.conf.json ${{ matrix.args }}
          else
            bun run tauri build -- --config src-tauri/tauri.ci.conf.json
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCRIMORA_LINK_GITHUB_REPOSITORY: ${{ github.repository }}
          SCRIMORA_LINK_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error
